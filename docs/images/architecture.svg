<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5C6770"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9AA5B1"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="900" height="480" fill="#FBFBFB"/>

  <!-- ===== Group label: 你的设备 ===== -->
  <text x="100" y="48" text-anchor="middle" fill="#5C6770" font-size="12" font-weight="600">你的设备</text>
  <rect x="20" y="60" width="160" height="120" rx="8" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.5"/>
  <rect x="40" y="95" width="120" height="55" rx="6" fill="#EBF2FF" stroke="#3370FF" stroke-width="1.5"/>
  <text x="100" y="120" text-anchor="middle" fill="#1F2328" font-size="14" font-weight="600">飞书 App</text>
  <text x="100" y="138" text-anchor="middle" fill="#5C6770" font-size="11">输入框 / 卡片</text>

  <!-- ===== Group label: 飞书云 ===== -->
  <text x="300" y="48" text-anchor="middle" fill="#5C6770" font-size="12" font-weight="600">飞书云</text>
  <rect x="220" y="60" width="160" height="120" rx="8" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.5"/>
  <rect x="240" y="95" width="120" height="55" rx="6" fill="#EBF2FF" stroke="#3370FF" stroke-width="1.5"/>
  <text x="300" y="120" text-anchor="middle" fill="#1F2328" font-size="14" font-weight="600">长连接路由</text>
  <text x="300" y="138" text-anchor="middle" fill="#5C6770" font-size="11">WebSocket</text>

  <!-- ===== AWS Cloud big container ===== -->
  <rect x="420" y="20" width="460" height="380" rx="10" fill="#FFFFFF" stroke="#FF9900" stroke-width="2"/>
  <text x="437" y="44" fill="#FF9900" font-size="13" font-weight="700">AWS Cloud</text>

  <!-- EC2 inner box -->
  <rect x="450" y="70" width="280" height="200" rx="8" fill="#FFF7ED" stroke="#FF9900" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="590" y="92" text-anchor="middle" fill="#A8540A" font-size="12" font-weight="700">EC2 t3.large（无入站端口）</text>

  <!-- cc-connect daemon -->
  <rect x="470" y="105" width="240" height="55" rx="6" fill="#FFFFFF" stroke="#FF9900" stroke-width="1.5"/>
  <text x="590" y="128" text-anchor="middle" fill="#1F2328" font-size="13" font-weight="600">cc-connect daemon</text>
  <text x="590" y="146" text-anchor="middle" fill="#5C6770" font-size="11">systemd user service</text>

  <!-- claude code subprocess -->
  <rect x="490" y="190" width="200" height="55" rx="6" fill="#FFFFFF" stroke="#9C5DFF" stroke-width="1.5"/>
  <text x="590" y="213" text-anchor="middle" fill="#1F2328" font-size="13" font-weight="600">Claude Code</text>
  <text x="590" y="231" text-anchor="middle" fill="#5C6770" font-size="11">子进程 / Agent</text>

  <!-- daemon -> claude code -->
  <line x1="590" y1="160" x2="590" y2="188" stroke="#5C6770" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bedrock -->
  <rect x="760" y="100" width="105" height="70" rx="6" fill="#FFF7ED" stroke="#FF9900" stroke-width="1.5"/>
  <text x="812" y="128" text-anchor="middle" fill="#1F2328" font-size="13" font-weight="600">Bedrock</text>
  <text x="812" y="146" text-anchor="middle" fill="#5C6770" font-size="11">Claude Sonnet</text>
  <text x="812" y="160" text-anchor="middle" fill="#5C6770" font-size="11">Claude Haiku</text>

  <!-- SSM ParamStore -->
  <rect x="760" y="200" width="105" height="70" rx="6" fill="#FFF7ED" stroke="#FF9900" stroke-width="1.5"/>
  <text x="812" y="226" text-anchor="middle" fill="#1F2328" font-size="13" font-weight="600">SSM Param</text>
  <text x="812" y="244" text-anchor="middle" fill="#5C6770" font-size="11">Bedrock API key</text>
  <text x="812" y="258" text-anchor="middle" fill="#5C6770" font-size="11">(SecureString)</text>

  <!-- claude code -> Bedrock -->
  <line x1="690" y1="208" x2="758" y2="140" stroke="#5C6770" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="725" y="158" fill="#5C6770" font-size="10" font-style="italic">Bearer token</text>

  <!-- SSM -> daemon (dashed, boot-time) -->
  <path d="M 760 235 Q 730 235 730 165" fill="none" stroke="#9AA5B1" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow-dashed)"/>
  <text x="744" y="220" fill="#9AA5B1" font-size="10" font-style="italic">开机注入</text>

  <!-- IAM role footer (inside AWS) -->
  <line x1="450" y1="295" x2="850" y2="295" stroke="#FFD9A6" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="650" y="318" text-anchor="middle" fill="#A8540A" font-size="11">IAM Instance Role：AmazonSSMManagedInstanceCore + 读 SSM Param</text>
  <text x="650" y="338" text-anchor="middle" fill="#A8540A" font-size="11">Security Group：入站 0 条 / 出站 ALL（飞书 / Bedrock / GitHub）</text>
  <text x="650" y="376" text-anchor="middle" fill="#5C6770" font-size="11" font-style="italic">运维通道：你的设备 ─aws ssm start-session─► EC2（IAM 鉴权，零公网端口）</text>

  <!-- ===== GitHub external ===== -->
  <text x="100" y="308" text-anchor="middle" fill="#5C6770" font-size="12" font-weight="600">GitHub</text>
  <rect x="20" y="320" width="160" height="80" rx="8" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.5"/>
  <rect x="40" y="340" width="120" height="45" rx="6" fill="#F5F5F5" stroke="#5C6770" stroke-width="1.2"/>
  <text x="100" y="360" text-anchor="middle" fill="#1F2328" font-size="13" font-weight="600">私有 / 公开仓库</text>
  <text x="100" y="375" text-anchor="middle" fill="#5C6770" font-size="11">SSH key 已同步</text>

  <!-- ===== Cross-group arrows ===== -->
  <!-- 飞书 App <-> 飞书云 -->
  <line x1="160" y1="118" x2="238" y2="118" stroke="#5C6770" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="240" y1="135" x2="162" y2="135" stroke="#5C6770" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="200" y="100" text-anchor="middle" fill="#5C6770" font-size="11">长连接</text>

  <!-- 飞书云 -> EC2 daemon (双向) -->
  <line x1="360" y1="118" x2="468" y2="125" stroke="#5C6770" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="470" y1="142" x2="362" y2="135" stroke="#5C6770" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="415" y="103" text-anchor="middle" fill="#5C6770" font-size="11">长连接 WSS</text>

  <!-- claude code -> github (curve, dashed) -->
  <path d="M 490 240 Q 280 290 180 360" fill="none" stroke="#9AA5B1" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow-dashed)"/>
  <text x="320" y="298" fill="#9AA5B1" font-size="11" font-style="italic">git clone（按需）</text>

  <!-- ===== Title ===== -->
  <text x="450" y="20" text-anchor="middle" fill="#1F2328" font-size="14" font-weight="700" opacity="0">cc-connect on AWS</text>
</svg>
